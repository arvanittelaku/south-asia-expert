[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Production: POST /api/submit-lead is handled by Next.js (Google Sheets + optional n8n webhook).
# For netlify dev with functions only, uncomment:
# [[redirects]]
#   from = "/api/submit-lead"
#   to = "/.netlify/functions/submit-lead"
#   status = 200
#   force = true

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain"
